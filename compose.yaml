services:
  postgres:
    image: postgres:16-alpine
    container_name: voiceai-postgres
    environment:
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: voiceai
      POSTGRES_DB: voiceai
    ports:
      - "5432:5432"
    volumes:
      - voiceai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai -d voiceai"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  voiceai-postgres-data:
